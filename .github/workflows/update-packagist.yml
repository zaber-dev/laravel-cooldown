name: Update Packagist

on:
  push:
    branches: [ "main", "master" ]
  release:
    types: [published]

jobs:
  update-packagist:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Packagist Update
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_API_TOKEN" ]; then
            echo "PACKAGIST_API_TOKEN secret is not set. Skipping update."
            exit 0
          fi

          curl -XPOST -H "Content-Type: application/json" \
               "https://packagist.org/api/update-package?username=zaber-dev&apiToken=${PACKAGIST_API_TOKEN}" \
               -d '{"repository":{"url":"https://packagist.org/packages/zaber-dev/laravel-cooldown"}}'
